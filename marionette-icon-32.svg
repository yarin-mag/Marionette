<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#2D1F6E"/>
  <!-- Vertical stem -->
  <rect x="15" y="4" width="2" height="7" rx="1" fill="none" stroke="#A99EE8" stroke-width="1"/>
  <!-- Crossbar -->
  <rect x="7" y="10" width="18" height="2" rx="1" fill="none" stroke="#A99EE8" stroke-width="1"/>
  <!-- Knuckle dots -->
  <circle cx="11" cy="11" r="1" fill="#A99EE8" opacity="0.75"/>
  <circle cx="16" cy="11" r="1" fill="#A99EE8" opacity="0.75"/>
  <circle cx="21" cy="11" r="1" fill="#A99EE8" opacity="0.75"/>
  <!-- Strings -->
  <line x1="11" y1="13" x2="9"  y2="18" stroke="#7F77DD" stroke-width="0.6" opacity="0.7"/>
  <line x1="16" y1="13" x2="16" y2="17" stroke="#7F77DD" stroke-width="0.6" opacity="0.7"/>
  <line x1="21" y1="13" x2="23" y2="18" stroke="#7F77DD" stroke-width="0.6" opacity="0.7"/>
  <!-- Agent left -->
  <rect x="5"  y="18" width="8" height="6" rx="2" fill="#4A3BAA" stroke="#7F77DD" stroke-width="0.6"/>
  <rect x="7"  y="20" width="4" height="1.5" rx="0.75" fill="#A99EE8" opacity="0.8"/>
  <rect x="7"  y="22.5" width="3" height="1.5" rx="0.75" fill="#A99EE8" opacity="0.5"/>
  <!-- Agent center -->
  <rect x="12" y="17" width="8" height="7" rx="2" fill="#4A3BAA" stroke="#9D94E8" stroke-width="0.9"/>
  <rect x="14" y="20" width="1.5" height="3" rx="0.75" fill="#A99EE8" opacity="0.45"/>
  <rect x="16" y="19" width="1.5" height="4" rx="0.75" fill="#FFFFFF"  opacity="0.9"/>
  <rect x="18" y="20.5" width="1.5" height="2.5" rx="0.75" fill="#A99EE8" opacity="0.6"/>
  <!-- Agent right -->
  <rect x="19" y="18" width="8" height="6" rx="2" fill="#4A3BAA" stroke="#7F77DD" stroke-width="0.6"/>
  <rect x="21" y="20" width="4" height="1.5" rx="0.75" fill="#A99EE8" opacity="0.8"/>
  <rect x="21" y="22.5" width="3" height="1.5" rx="0.75" fill="#A99EE8" opacity="0.5"/>
</svg>
