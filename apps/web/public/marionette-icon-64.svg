  <line x1="32" y1="25" x2="32" y2="34" stroke="#7F77DD" stroke-width="0.8" opacity="0.65"/>
  <line x1="42" y1="25" x2="45" y2="36" stroke="#7F77DD" stroke-width="0.8" opacity="0.65"/>
  <!-- Agent left -->
  <rect x="11" y="37" width="16" height="12" rx="3" fill="#4A3BAA" stroke="#7F77DD" stroke-width="0.8"/>
  <rect x="14" y="40" width="6"  height="2" rx="1" fill="#A99EE8" opacity="0.8"/>
  <rect x="14" y="44" width="9"  height="2" rx="1" fill="#A99EE8" opacity="0.5"/>
