  <rect x="27" y="39" width="2"  height="6" rx="1" fill="#A99EE8" opacity="0.45"/>
  <rect x="30" y="37" width="2"  height="8" rx="1" fill="#FFFFFF"  opacity="0.9"/>
  <rect x="33" y="40" width="2"  height="5" rx="1" fill="#A99EE8" opacity="0.6"/>
  <rect x="36" y="38" width="2"  height="7" rx="1" fill="#A99EE8" opacity="0.45"/>
  <!-- Agent right -->
  <rect x="37" y="37" width="16" height="12" rx="3" fill="#4A3BAA" stroke="#7F77DD" stroke-width="0.8"/>
  <rect x="40" y="40" width="9"  height="2" rx="1" fill="#A99EE8" opacity="0.8"/>
  <rect x="40" y="44" width="6"  height="2" rx="1" fill="#A99EE8" opacity="0.5"/>
